MANUS_TASK_START:

  name: "Technik Renders — Daily YouTube Automation"
  run_mode: autonomous
  stop_on_error: false
  notify_email: logivo92@gmail.com
  channel_name: "Technik Renders"
  niche: "cinematic luxury automotive"
  target_platform: YouTube
  cross_post: [Instagram Reels, TikTok, X]

# ============================================================
# PHASE 1 — ENVIRONMENT SETUP
# ============================================================

PHASE_1_SETUP:

  step_1_install_tools:
    description: "Install all required CLI tools if not already installed"
    commands:
      - npm install -g vercel
      - npm install -g @anthropic-ai/sdk
      - pip install requests python-dotenv pillow
    on_fail: log_and_continue

  step_2_load_env:
    description: "Load environment variables"
    required_vars:
      - ANTHROPIC_API_KEY        # From: console.anthropic.com/account/keys
      - ELEVENLABS_API_KEY       # From: elevenlabs.io/api
      - YOUTUBE_CLIENT_ID        # From: console.cloud.google.com
      - YOUTUBE_CLIENT_SECRET    # From: console.cloud.google.com
      - YOUTUBE_REFRESH_TOKEN    # Generated via OAuth2 flow
      - VERCEL_TOKEN             # From: vercel.com/account/tokens
    env_file: .env
    on_missing: pause_and_request_from_user

  step_3_create_project:
    description: "Create working directory and project scaffold"
    commands:
      - mkdir -p technik-pipeline/output/scripts
      - mkdir -p technik-pipeline/output/audio
      - mkdir -p technik-pipeline/output/renders
      - mkdir -p technik-pipeline/output/thumbnails
      - mkdir -p technik-pipeline/output/videos
      - mkdir -p technik-pipeline/output/seo
      - mkdir -p technik-pipeline/output/social
      - mkdir -p technik-pipeline/logs
      - echo "Pipeline initialized" > technik-pipeline/logs/run.log

# ============================================================
# PHASE 2 — IDEA GENERATION (Claude API)
# ============================================================

PHASE_2_IDEA:

  step_4_generate_idea:
    description: "Use Claude API to generate today's video topic"
    script: |
      #!/usr/bin/env python3
      import anthropic, json, datetime, os

      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

      system = """You are a YouTube strategist for Technik Renders — a faceless cinematic automotive channel.
      You generate high-CPM viral video ideas for a luxury car audience aged 22-45.
      Output ONLY valid JSON. No markdown. No explanation."""

      prompt = """Generate today's best YouTube video idea for Technik Renders.
      Return JSON exactly like this:
      {
        "title": "video title under 70 chars",
        "hook": "one sentence hook — what makes someone click",
        "angle": "the unique editorial angle",
        "featured_car": "hero car for renders",
        "render_style": "visual style description",
        "revenue_type": "AdSense|Affiliate|Sponsor|Product",
        "affiliate_product": "relevant product to promote",
        "target_keywords": ["keyword1", "keyword2", "keyword3"],
        "estimated_cpm": "$8-15"
      }"""

      message = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=500,
        system=system,
        messages=[{"role": "user", "content": prompt}]
      )

      idea = json.loads(message.content[0].text)
      today = datetime.date.today().isoformat()
      idea["date"] = today

      with open("technik-pipeline/output/idea.json", "w") as f:
        json.dump(idea, f, indent=2)

      print(f"IDEA GENERATED: {idea['title']}")
      print(f"Featured car: {idea['featured_car']}")
      print(f"Revenue type: {idea['revenue_type']}")
    save_output: technik-pipeline/output/idea.json

# ============================================================
# PHASE 3 — SCRIPT WRITING (Claude API)
# ============================================================

PHASE_3_SCRIPT:

  step_5_write_script:
    description: "Write full 10-minute voiceover script using Claude"
    script: |
      #!/usr/bin/env python3
      import anthropic, json, os

      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

      with open("technik-pipeline/output/idea.json") as f:
        idea = json.load(f)

      system = """You are an elite YouTube scriptwriter for Technik Renders — a faceless cinematic 
      automotive channel with a dark luxury editorial aesthetic. 
      Write pure voiceover scripts only. No stage directions. No timestamps. No camera notes.
      Use ALL-CAPS section headers. High information density. Zero filler.
      Style: deep luxury documentary narrator — calm, authoritative, cinematic.
      Every sentence must earn its place."""

      prompt = f"""Write a complete 10-minute YouTube voiceover script.

      Title: "{idea['title']}"
      Featured car: {idea['featured_car']}
      Angle: {idea['angle']}
      Affiliate product to promote: {idea['affiliate_product']}

      STRUCTURE:
      HOOK
      [30-second cold open — bold statement or shocking fact. No channel intro. Grip immediately.]

      SECTION 1 — [topic]
      SECTION 2 — [topic]  
      SECTION 3 — [topic]
      SECTION 4 — [topic]
      SECTION 5 — [topic]

      MID-ROLL CTA
      [15 seconds — natural integration: "Before we continue — {idea['affiliate_product']} — link in description."]

      CLOSE
      [One powerful final line. Make viewers want to subscribe and return.]

      Pure voiceover only. No directions."""

      message = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=2000,
        system=system,
        messages=[{"role": "user", "content": prompt}]
      )

      script = message.content[0].text
      title_slug = idea['title'].lower().replace(' ', '-').replace('—', '').replace("'", '')[:50]

      with open(f"technik-pipeline/output/scripts/script_{title_slug}.txt", "w") as f:
        f.write(f"TITLE: {idea['title']}\n")
        f.write(f"DATE: {idea['date']}\n")
        f.write("="*60 + "\n\n")
        f.write(script)

      with open("technik-pipeline/output/script_path.txt", "w") as f:
        f.write(f"technik-pipeline/output/scripts/script_{title_slug}.txt")

      print(f"SCRIPT WRITTEN: {len(script)} characters")
    depends_on: step_5_write_script
    save_output: technik-pipeline/output/scripts/

# ============================================================
# PHASE 4 — VOICEOVER (ElevenLabs API)
# ============================================================

PHASE_4_VOICEOVER:

  step_6_generate_voiceover:
    description: "Generate AI voiceover using ElevenLabs API"
    script: |
      #!/usr/bin/env python3
      import requests, json, os

      ELEVENLABS_API_KEY = os.environ["ELEVENLABS_API_KEY"]

      # Technik Renders voice settings
      # Recommended voice: "Rachel" (calm, authoritative) or "Bella" (luxury feel)
      # Change VOICE_ID to your saved custom voice ID if you have one
      VOICE_ID = os.environ.get("ELEVENLABS_VOICE_ID", "21m00Tcm4TlvDq8ikWAM")  # Rachel default

      with open("technik-pipeline/output/script_path.txt") as f:
        script_path = f.read().strip()

      with open(script_path) as f:
        full_text = f.read()

      # Extract just the script content (skip header)
      script_content = full_text.split("="*60)[-1].strip()

      url = f"https://api.elevenlabs.io/v1/text-to-speech/{VOICE_ID}"

      headers = {
        "Accept": "audio/mpeg",
        "Content-Type": "application/json",
        "xi-api-key": ELEVENLABS_API_KEY
      }

      data = {
        "text": script_content,
        "model_id": "eleven_multilingual_v2",
        "voice_settings": {
          "stability": 0.55,
          "similarity_boost": 0.75,
          "style": 0.0,
          "use_speaker_boost": True
        }
      }

      print("Generating voiceover via ElevenLabs...")
      response = requests.post(url, json=data, headers=headers)

      if response.status_code == 200:
        with open("technik-pipeline/output/audio/voiceover.mp3", "wb") as f:
          f.write(response.content)
        print("VOICEOVER GENERATED: technik-pipeline/output/audio/voiceover.mp3")
      else:
        print(f"ElevenLabs error {response.status_code}: {response.text}")
        print("FALLBACK: Script saved — generate voiceover manually at elevenlabs.io")
    save_output: technik-pipeline/output/audio/voiceover.mp3
    on_fail: log_and_continue

# ============================================================
# PHASE 5 — RENDER & THUMBNAIL BRIEFS (Claude API)
# ============================================================

PHASE_5_RENDERS:

  step_7_generate_render_briefs:
    description: "Generate Midjourney prompts for renders and thumbnails"
    script: |
      #!/usr/bin/env python3
      import anthropic, json, os

      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

      with open("technik-pipeline/output/idea.json") as f:
        idea = json.load(f)

      system = """You are a creative director for Technik Renders — a cinematic automotive YouTube channel 
      with a dark luxury aesthetic similar to Avante Designs. You produce precise Midjourney prompts 
      that generate stunning automotive renders. Output ONLY valid JSON. No markdown."""

      prompt = f"""Generate render and thumbnail briefs for:
      Video: "{idea['title']}"
      Car: {idea['featured_car']}
      Style: {idea['render_style']}

      Return JSON exactly:
      {{
        "b_roll_prompts": [
          "prompt 1 — for main video footage clip 1",
          "prompt 2 — for main video footage clip 2", 
          "prompt 3 — for main video footage clip 3",
          "prompt 4 — for main video footage clip 4",
          "prompt 5 — for main video footage clip 5",
          "prompt 6 — for main video footage clip 6"
        ],
        "thumbnail_variants": [
          {{
            "label": "Dark Studio",
            "midjourney_prompt": "full prompt --ar 16:9 --style raw --q 2",
            "canva_text": "5 words max",
            "canva_font": "Bebas Neue",
            "canva_color": "#C9A84C",
            "canva_position": "bottom-left"
          }},
          {{
            "label": "Motion Blur",
            "midjourney_prompt": "full prompt --ar 16:9 --style raw --q 2",
            "canva_text": "5 words max",
            "canva_font": "Montserrat Black",
            "canva_color": "#FFFFFF",
            "canva_position": "centre"
          }},
          {{
            "label": "Detail Close-up",
            "midjourney_prompt": "full prompt --ar 16:9 --style raw --q 2",
            "canva_text": "5 words max",
            "canva_font": "Bebas Neue",
            "canva_color": "#C9A84C",
            "canva_position": "top-right"
          }}
        ],
        "higgsfield_video_prompt": "cinematic video prompt for Higgsfield to generate hero footage",
        "invideo_style": "Cinematic",
        "invideo_mood": "Luxury Dark"
      }}"""

      message = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=1500,
        system=system,
        messages=[{"role": "user", "content": prompt}]
      )

      briefs = json.loads(message.content[0].text)

      with open("technik-pipeline/output/renders/render_briefs.json", "w") as f:
        json.dump(briefs, f, indent=2)

      # Write human-readable version for manual steps
      with open("technik-pipeline/output/renders/MIDJOURNEY_PROMPTS.txt", "w") as f:
        f.write("="*60 + "\n")
        f.write("TECHNIK RENDERS — MIDJOURNEY PROMPTS\n")
        f.write("="*60 + "\n\n")
        f.write("B-ROLL CLIPS (run each in Midjourney, save as clip_1 through clip_6):\n\n")
        for i, p in enumerate(briefs['b_roll_prompts'], 1):
          f.write(f"CLIP {i}:\n{p}\n\n")
        f.write("="*60 + "\n")
        f.write("THUMBNAIL VARIANTS:\n\n")
        for v in briefs['thumbnail_variants']:
          f.write(f"VARIANT — {v['label']}:\n")
          f.write(f"Midjourney: {v['midjourney_prompt']}\n")
          f.write(f"Canva text: {v['canva_text']}\n")
          f.write(f"Font: {v['canva_font']} | Colour: {v['canva_color']} | Position: {v['canva_position']}\n\n")
        f.write("="*60 + "\n")
        f.write("HIGGSFIELD HERO PROMPT:\n")
        f.write(briefs['higgsfield_video_prompt'] + "\n")

      print("RENDER BRIEFS GENERATED")
      print(f"B-roll prompts: {len(briefs['b_roll_prompts'])}")
      print(f"Thumbnail variants: {len(briefs['thumbnail_variants'])}")
    save_output: technik-pipeline/output/renders/

# ============================================================
# PHASE 6 — SEO PACKAGE (Claude API)
# ============================================================

PHASE_6_SEO:

  step_8_generate_seo:
    description: "Generate complete YouTube SEO package"
    script: |
      #!/usr/bin/env python3
      import anthropic, json, os

      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

      with open("technik-pipeline/output/idea.json") as f:
        idea = json.load(f)

      system = """You are a YouTube SEO specialist for Technik Renders — a cinematic automotive channel.
      Produce metadata that ranks and converts. Target high-CPM automotive audiences.
      Output ONLY valid JSON. No markdown."""

      prompt = f"""Generate complete YouTube SEO package for:
      Title: "{idea['title']}"
      Car: {idea['featured_car']}
      Keywords: {idea['target_keywords']}
      Affiliate: {idea['affiliate_product']}

      Return JSON exactly:
      {{
        "seo_title": "under 70 chars, keyword-first",
        "description": "230-word description with primary keyword in line 1, 3 keyword variations, [AFFILIATE LINK] placeholder, subscribe CTA at end",
        "tags": ["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10","tag11","tag12","tag13","tag14","tag15","tag16","tag17","tag18"],
        "chapters": [
          {{"time": "0:00", "title": "chapter name"}},
          {{"time": "1:20", "title": "chapter name"}},
          {{"time": "2:45", "title": "chapter name"}},
          {{"time": "4:30", "title": "chapter name"}},
          {{"time": "6:15", "title": "chapter name"}},
          {{"time": "8:00", "title": "chapter name"}},
          {{"time": "9:20", "title": "chapter name"}}
        ],
        "hashtags": ["#hashtag1","#hashtag2","#hashtag3","#hashtag4","#hashtag5"],
        "thumbnail_text": "5 bold words for overlay",
        "category": "Autos & Vehicles",
        "language": "en",
        "made_for_kids": false
      }}"""

      message = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=1000,
        system=system,
        messages=[{"role": "user", "content": prompt}]
      )

      seo = json.loads(message.content[0].text)

      with open("technik-pipeline/output/seo/seo_package.json", "w") as f:
        json.dump(seo, f, indent=2)

      # Build chapters string for description
      chapters_str = "\n".join([f"{c['time']} {c['title']}" for c in seo['chapters']])
      hashtags_str = " ".join(seo['hashtags'])

      # Build full description with chapters
      full_description = seo['description'].replace(
        "[AFFILIATE LINK]", 
        f"[AFFILIATE LINK — {idea['affiliate_product']}]"
      )
      full_description += f"\n\n— TIMESTAMPS —\n{chapters_str}"
      full_description += f"\n\n{hashtags_str}"

      # Write upload-ready file
      with open("technik-pipeline/output/seo/UPLOAD_READY.txt", "w") as f:
        f.write("="*60 + "\n")
        f.write("YOUTUBE UPLOAD PACKAGE — PASTE READY\n")
        f.write("="*60 + "\n\n")
        f.write(f"TITLE:\n{seo['seo_title']}\n\n")
        f.write(f"DESCRIPTION:\n{full_description}\n\n")
        f.write(f"TAGS (comma separated):\n{', '.join(seo['tags'])}\n\n")
        f.write(f"THUMBNAIL TEXT:\n{seo['thumbnail_text']}\n\n")
        f.write(f"CATEGORY: {seo['category']}\n")
        f.write(f"LANGUAGE: {seo['language']}\n")
        f.write(f"MADE FOR KIDS: {seo['made_for_kids']}\n")

      print("SEO PACKAGE GENERATED")
      print(f"Title: {seo['seo_title']}")
      print(f"Tags: {len(seo['tags'])}")
    save_output: technik-pipeline/output/seo/

