          f.write(f"{platform.upper().replace('_', ' ')}:\n{copy}\n\n")

      print("SOCIAL COPY GENERATED for Instagram, TikTok, X, YouTube Community")
    save_output: technik-pipeline/output/social/

# ============================================================
# PHASE 8 — YOUTUBE UPLOAD (YouTube Data API v3)
# ============================================================

PHASE_8_UPLOAD:

  step_10_upload_to_youtube:
    description: "Upload video to YouTube with full metadata using YouTube Data API"
    note: "Requires video file at technik-pipeline/output/videos/final_video.mp4"
    script: |
      #!/usr/bin/env python3
      import json, os, sys
      from googleapiclient.discovery import build
      from googleapiclient.http import MediaFileUpload
      from google.oauth2.credentials import Credentials
      from google.auth.transport.requests import Request

      VIDEO_PATH = "technik-pipeline/output/videos/final_video.mp4"
      THUMBNAIL_PATH = "technik-pipeline/output/thumbnails/thumbnail_A.jpg"

      if not os.path.exists(VIDEO_PATH):
        print("VIDEO FILE NOT FOUND — manual upload required")
        print(f"Place your video at: {VIDEO_PATH}")
        print("Then re-run this phase only")
        print("\nUPLOAD PACKAGE ready at: technik-pipeline/output/seo/UPLOAD_READY.txt")
        sys.exit(0)

      # Load credentials
      creds = Credentials(
        token=None,
        refresh_token=os.environ["YOUTUBE_REFRESH_TOKEN"],
        token_uri="https://oauth2.googleapis.com/token",
        client_id=os.environ["YOUTUBE_CLIENT_ID"],
        client_secret=os.environ["YOUTUBE_CLIENT_SECRET"],
        scopes=["https://www.googleapis.com/auth/youtube.upload",
                "https://www.googleapis.com/auth/youtube"]
      )
      creds.refresh(Request())

      youtube = build("youtube", "v3", credentials=creds)

      with open("technik-pipeline/output/seo/seo_package.json") as f:
        seo = json.load(f)
      with open("technik-pipeline/output/idea.json") as f:
        idea = json.load(f)

      # Build full description
      chapters_str = "\n".join([f"{c['time']} {c['title']}" for c in seo['chapters']])
      hashtags_str = " ".join(seo['hashtags'])
      full_description = seo['description'] + f"\n\n— TIMESTAMPS —\n{chapters_str}\n\n{hashtags_str}"

      body = {
        "snippet": {
          "title": seo["seo_title"],
          "description": full_description,
          "tags": seo["tags"],
          "categoryId": "2",  # Autos & Vehicles
          "defaultLanguage": "en",
          "defaultAudioLanguage": "en"
        },
        "status": {
          "privacyStatus": "public",
          "selfDeclaredMadeForKids": False,
          "publishAt": None  # Publish immediately
        }
      }

      media = MediaFileUpload(VIDEO_PATH, chunksize=-1, resumable=True)

      print("Uploading to YouTube...")
      request = youtube.videos().insert(part=",".join(body.keys()), body=body, media_body=media)

      response = None
      while response is None:
        status, response = request.next_chunk()
        if status:
          print(f"Upload progress: {int(status.progress() * 100)}%")

      video_id = response["id"]
      video_url = f"https://youtube.com/watch?v={video_id}"
      print(f"VIDEO UPLOADED: {video_url}")

      # Set thumbnail
      if os.path.exists(THUMBNAIL_PATH):
        youtube.thumbnails().set(
          videoId=video_id,
          media_body=MediaFileUpload(THUMBNAIL_PATH)
        ).execute()
        print("THUMBNAIL SET")

      # Save video ID for social distribution
      with open("technik-pipeline/output/video_id.txt", "w") as f:
        f.write(video_id)

      with open("technik-pipeline/output/video_url.txt", "w") as f:
        f.write(video_url)

      print(f"\nYOUTUBE UPLOAD COMPLETE")
      print(f"URL: {video_url}")
    depends_on: [step_8_generate_seo, step_9_generate_social_copy]
    pip_install: [google-api-python-client, google-auth, google-auth-httplib2]
    save_output: technik-pipeline/output/video_url.txt

# ============================================================
# PHASE 9 — SOCIAL DISTRIBUTION (via APIs)
# ============================================================

PHASE_9_SOCIAL_DISTRIBUTION:

  step_11_post_to_social:
    description: "Distribute video clip and captions to all social platforms"
    note: "Requires social API keys in .env — see credentials section below"
    script: |
      #!/usr/bin/env python3
      import json, os, requests

      with open("technik-pipeline/output/social/social_copy.json") as f:
        social = json.load(f)

      video_url = ""
      if os.path.exists("technik-pipeline/output/video_url.txt"):
        with open("technik-pipeline/output/video_url.txt") as f:
          video_url = f.read().strip()

      results = {}

      # ── X / TWITTER ──────────────────────────────────────
      X_BEARER_TOKEN = os.environ.get("X_BEARER_TOKEN", "")
      X_API_KEY = os.environ.get("X_API_KEY", "")
      X_API_SECRET = os.environ.get("X_API_SECRET", "")
      X_ACCESS_TOKEN = os.environ.get("X_ACCESS_TOKEN", "")
      X_ACCESS_SECRET = os.environ.get("X_ACCESS_SECRET", "")

      if X_ACCESS_TOKEN:
        try:
          import tweepy
          client = tweepy.Client(
            consumer_key=X_API_KEY,
            consumer_secret=X_API_SECRET,
            access_token=X_ACCESS_TOKEN,
            access_token_secret=X_ACCESS_SECRET
          )
          x_text = social["x_post"].replace("[YOUTUBE_LINK]", video_url)
          tweet = client.create_tweet(text=x_text)
          results["X"] = f"Posted — tweet ID: {tweet.data['id']}"
          print(f"X POST LIVE: {x_text}")
        except Exception as e:
          results["X"] = f"Failed: {str(e)}"
      else:
        results["X"] = "SKIPPED — X_ACCESS_TOKEN not set"

      # ── INSTAGRAM (via Meta Graph API) ───────────────────
      INSTAGRAM_USER_ID = os.environ.get("INSTAGRAM_USER_ID", "")
      INSTAGRAM_ACCESS_TOKEN = os.environ.get("INSTAGRAM_ACCESS_TOKEN", "")

      if INSTAGRAM_ACCESS_TOKEN and INSTAGRAM_USER_ID:
        try:
          ig_caption = social["instagram_reel_caption"].replace("[YOUTUBE_LINK]", f"Link in bio → {video_url}")
          # Note: Reels require a video URL hosted publicly
          # For automation, host the clip on your server or use a CDN URL
          REEL_VIDEO_URL = os.environ.get("REEL_VIDEO_URL", "")
          if REEL_VIDEO_URL:
            create_url = f"https://graph.facebook.com/v18.0/{INSTAGRAM_USER_ID}/reels"
            create_payload = {
              "video_url": REEL_VIDEO_URL,
              "caption": ig_caption,
              "access_token": INSTAGRAM_ACCESS_TOKEN
            }
            create_resp = requests.post(create_url, data=create_payload).json()
            creation_id = create_resp.get("id")
            if creation_id:
              publish_url = f"https://graph.facebook.com/v18.0/{INSTAGRAM_USER_ID}/media_publish"
              pub_resp = requests.post(publish_url, data={"creation_id": creation_id, "access_token": INSTAGRAM_ACCESS_TOKEN}).json()
              results["Instagram"] = f"Reel published — ID: {pub_resp.get('id')}"
            else:
              results["Instagram"] = f"Container failed: {create_resp}"
          else:
            results["Instagram"] = "SKIPPED — REEL_VIDEO_URL not set (need public video URL)"
        except Exception as e:
          results["Instagram"] = f"Failed: {str(e)}"
      else:
        results["Instagram"] = "SKIPPED — Instagram tokens not set"

      # ── TIKTOK (via TikTok Content Posting API) ───────────
      TIKTOK_ACCESS_TOKEN = os.environ.get("TIKTOK_ACCESS_TOKEN", "")
      if TIKTOK_ACCESS_TOKEN:
        try:
          # TikTok requires video upload via their API
          # Direct post with caption only (video upload is separate)
          results["TikTok"] = "TikTok requires manual video upload — caption ready in social/SOCIAL_READY.txt"
        except Exception as e:
          results["TikTok"] = f"Failed: {str(e)}"
      else:
        results["TikTok"] = "SKIPPED — TIKTOK_ACCESS_TOKEN not set"

      # ── YOUTUBE COMMUNITY POST ────────────────────────────
      from google.oauth2.credentials import Credentials
      from google.auth.transport.requests import Request
      from googleapiclient.discovery import build

      try:
        creds = Credentials(
          token=None,
          refresh_token=os.environ.get("YOUTUBE_REFRESH_TOKEN", ""),
          token_uri="https://oauth2.googleapis.com/token",
          client_id=os.environ.get("YOUTUBE_CLIENT_ID", ""),
          client_secret=os.environ.get("YOUTUBE_CLIENT_SECRET", ""),
          scopes=["https://www.googleapis.com/auth/youtube"]
        )
        if creds.refresh_token:
          creds.refresh(Request())
          youtube = build("youtube", "v3", credentials=creds)
          community_text = social["youtube_community_post"].replace("[YOUTUBE_LINK]", video_url)
          youtube.communityPosts().insert(
            part="snippet",
            body={"snippet": {"type": "textPost", "textOriginalContent": {"text": community_text}}}
          ).execute()
          results["YouTube Community"] = "Community post published"
      except Exception as e:
        results["YouTube Community"] = f"Failed: {str(e)}"

      # ── SAVE DISTRIBUTION REPORT ─────────────────────────
      with open("technik-pipeline/output/social/distribution_report.json", "w") as f:
        json.dump(results, f, indent=2)

      print("\nDISTRIBUTION REPORT:")
      for platform, status in results.items():
        print(f"  {platform}: {status}")
    pip_install: [tweepy, requests, google-api-python-client, google-auth]
    save_output: technik-pipeline/output/social/distribution_report.json

