PHASE_7_SOCIAL:

  step_9_generate_social_copy:
    description: "Generate social media captions for all platforms"
    script: |
      #!/usr/bin/env python3
      import anthropic, json, os

      client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

      with open("technik-pipeline/output/idea.json") as f:
        idea = json.load(f)
      with open("technik-pipeline/output/seo/seo_package.json") as f:
        seo = json.load(f)

      system = """You are a social media strategist for Technik Renders — a cinematic automotive brand.
      Write platform-native captions that drive clicks to YouTube.
      Output ONLY valid JSON. No markdown."""

      prompt = f"""Write social media captions for a new YouTube video:
      Title: "{idea['title']}"
      Hook: "{idea['hook']}"
      Car: {idea['featured_car']}
      YouTube link placeholder: [YOUTUBE_LINK]

      Return JSON exactly:
      {{
        "instagram_reel_caption": "Instagram caption under 150 chars, punchy, ends with link in bio CTA. Include 5 relevant hashtags.",
        "tiktok_caption": "TikTok caption under 100 chars, trend-aware, hook-first. Include 3 hashtags.",
        "x_post": "X/Twitter post under 240 chars with link. Bold claim first.",
        "instagram_story_text": "5 words for story overlay — bold, curiosity-driven",
