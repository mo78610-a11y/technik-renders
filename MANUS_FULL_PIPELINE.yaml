      from email.mime.text import MIMEText

      # Load all outputs
      with open("technik-pipeline/output/idea.json") as f:
        idea = json.load(f)

      seo = {}
      try:
        with open("technik-pipeline/output/seo/seo_package.json") as f:
          seo = json.load(f)
      except: pass

      distribution = {}
      try:
        with open("technik-pipeline/output/social/distribution_report.json") as f:
          distribution = json.load(f)
      except: pass

      video_url = "Not yet uploaded"
      try:
        with open("technik-pipeline/output/video_url.txt") as f:
          video_url = f.read().strip()
      except: pass

      social_copy = {}
      try:
        with open("technik-pipeline/output/social/social_copy.json") as f:
          social_copy = json.load(f)
      except: pass

      now = datetime.datetime.now().strftime("%d %B %Y, %H:%M")

      html = f"""
      <html><body style="font-family:Arial,sans-serif;font-size:14px;color:#111;max-width:680px;margin:0 auto;padding:20px;">
      <h1 style="font-size:20px;font-weight:700;background:#000;color:#c9a84c;padding:16px 20px;border-radius:6px;">
        Technik Renders — Daily Pipeline Complete
      </h1>
      <p style="color:#555;font-size:13px;">Run completed: {now}</p>

      <h2 style="font-size:16px;margin-top:24px;">Today's Video</h2>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <tr style="background:#f9f9f9;"><td style="padding:10px;border:1px solid #eee;font-weight:600;width:30%;">Title</td><td style="padding:10px;border:1px solid #eee;">{idea.get('title','—')}</td></tr>
        <tr><td style="padding:10px;border:1px solid #eee;font-weight:600;">SEO Title</td><td style="padding:10px;border:1px solid #eee;">{seo.get('seo_title', idea.get('title','—'))}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding:10px;border:1px solid #eee;font-weight:600;">Featured Car</td><td style="padding:10px;border:1px solid #eee;">{idea.get('featured_car','—')}</td></tr>
        <tr><td style="padding:10px;border:1px solid #eee;font-weight:600;">Revenue Type</td><td style="padding:10px;border:1px solid #eee;">{idea.get('revenue_type','—')}</td></tr>
        <tr style="background:#f9f9f9;"><td style="padding:10px;border:1px solid #eee;font-weight:600;">Affiliate</td><td style="padding:10px;border:1px solid #eee;">{idea.get('affiliate_product','—')}</td></tr>
        <tr><td style="padding:10px;border:1px solid #eee;font-weight:600;">YouTube URL</td><td style="padding:10px;border:1px solid #eee;"><a href="{video_url}">{video_url}</a></td></tr>
      </table>

      <h2 style="font-size:16px;margin-top:24px;">Distribution Status</h2>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        {''.join([f'<tr {"style=background:#f9f9f9;" if i%2==0 else ""}><td style="padding:10px;border:1px solid #eee;font-weight:600;">{k}</td><td style="padding:10px;border:1px solid #eee;">{v}</td></tr>' for i,(k,v) in enumerate(distribution.items())])}
      </table>

      <h2 style="font-size:16px;margin-top:24px;">Manual Steps Still Required</h2>
      <ol style="font-size:13px;line-height:2;color:#333;">
        <li>Run Midjourney prompts → save renders to <code>output/renders/</code></li>
        <li>Run Higgsfield hero clip → add to <code>output/videos/</code></li>
        <li>Assemble video in Invideo AI → export to <code>output/videos/final_video.mp4</code></li>
        <li>Create thumbnails in Canva → save to <code>output/thumbnails/</code></li>
        <li>Re-run Phase 8 (upload) once video file exists</li>
        <li>Activate TubeBuddy A/B thumbnail test after upload</li>
      </ol>

      <h2 style="font-size:16px;margin-top:24px;">Social Captions Ready</h2>
      <div style="background:#f5f5f5;padding:14px;border-radius:6px;font-size:12px;white-space:pre-wrap;font-family:'Courier New',monospace;">
        INSTAGRAM: {social_copy.get('instagram_reel_caption','—')}

        TIKTOK: {social_copy.get('tiktok_caption','—')}

        X: {social_copy.get('x_post','—')}
      </div>

      <p style="font-size:11px;color:#aaa;margin-top:24px;border-top:1px solid #eee;padding-top:12px;">
        Technik Renders — Automated by Claude AI + Manus Pipeline
      </p>
      </body></html>
      """

      # Send via Gmail SMTP
      GMAIL_USER = "logivo92@gmail.com"
      GMAIL_APP_PASSWORD = os.environ.get("GMAIL_APP_PASSWORD", "")

      if GMAIL_APP_PASSWORD:
        msg = MIMEMultipart("alternative")
        msg["Subject"] = f"Technik Renders — Pipeline Complete | {idea.get('title','Daily Run')[:40]}"
        msg["From"] = GMAIL_USER
        msg["To"] = GMAIL_USER
        msg.attach(MIMEText(html, "html"))

        with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
          server.login(GMAIL_USER, GMAIL_APP_PASSWORD)
          server.sendmail(GMAIL_USER, GMAIL_USER, msg.as_string())

        print("COMPLETION EMAIL SENT to logivo92@gmail.com")
      else:
        with open("technik-pipeline/output/completion_report.html", "w") as f:
          f.write(html)
        print("GMAIL_APP_PASSWORD not set — report saved to output/completion_report.html")

    save_output: technik-pipeline/output/completion_report.html

